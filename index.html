<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>
 
<header class="header">
<div class="logo"> ❑ Sarah's Advanced Trainer </div>
</header>
<div class="container">

<div class="left">
<div class="card">

<h1>Virtual Cube</h1>

<div class="buttons">
<button class="btnNext" onclick=nextProblem()>Next</button>
</div>
 
<svg class="skewb" width="300" height="300" viewBox="-150 -150 300 300"></svg>
<div class="textbox">
テキスト表示
</div>

<div class="buttons">
<button class="btnS" onclick="sledge()">S</button>
<button class="btnH" onclick="hedge()">H</button>
</div>

<div class="buttons">
<button class="btnUp" onclick="up()">↑</button>
<button class="btnUp2" onclick="up2()">↑2</button>
<button class="btnDown" onclick="down()">↓</button>
</div>

<div class="buttons">
<button class="btnCcw" onclick="ccw()">↶</button>
<button class="btnCw2" onclick="cw2()">↶2</button>
<button class="btnCw" onclick="cw()">↷</button>
</div>

 <div class="buttons">
<button class="btnCcw" onclick="left()">←</button>
<button class="btnCw2" onclick="left2()">←2</button>
<button class="btnCw" onclick="right()">→</button>
</div>

 
</div>
</div>
 
<div class="right">
<div class="card">

<h1>Cases</h1>
<div class="buttons">
<button class="btnSaveSetting" onclick="generateProblem()">Save Settings</button>
</div>
 
<h2>Pi</h2>
<div class="checkrow">
<label><input type="checkbox" id=PiS>Pi+Swirl</label>
<label><input type="checkbox" id=PiW>Pi+Wat</label>
<label><input type="checkbox" id=PiX>Pi+X</label>
<label><input type="checkbox" id=PiO>Pi+O</label>
</div>

 
<div class="checkrow">
<label><input type="checkbox" id=PiZC>Pi+ZC</label>
<label><input type="checkbox" id=Pi3S>Pi+3S</label>
<label><input type="checkbox" id=PiHU>Pi+HU</label>
<label><input type="checkbox" id=PiVU>Pi+VU</label>
</div>

<div class="checkrow">
<label><input type="checkbox" id=PiHZ>Pi+H and Z</label>
<label><input type="checkbox" id=PiSk>Pi+Skip</label>
</div>

<h2>Peanut</h2> 
<div class="checkrow">
<label><input type="checkbox" id=PnS>Pn+Swirl</label>
<label><input type="checkbox" id=PnW>Pn+Wat</label>
<label><input type="checkbox" id=PnX>Pn+X</label>
<label><input type="checkbox" id=PnO>Pn+O</label>
</div>

 
<div class="checkrow">
<label><input type="checkbox" id=PnZC>Pn+ZC</label>
<label><input type="checkbox" id=Pn3S>Pn+3S</label>
<label><input type="checkbox" id=PnHU>Pn+HU</label>
<label><input type="checkbox" id=PnVU>Pn+VU</label>
</div>

<div class="checkrow">
<label><input type="checkbox" id=PnHZ>Pn+H and Z</label>
<label><input type="checkbox" id=PnSk>Pn+Skip</label>
</div>

</div>

 
<script src="move.js"></script>
<script src="draw.js"></script>
<script src="quiz.js"></script>

 <body onload="loadCSV()">

</html>
