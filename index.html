
<!DOCTYPE html>
<html>
<body>

<svg id="skewb" width="600" height="600" viewBox="-300 -300 600 600"></svg>

<script>

const COS60 = 0.5
const SIN60 = 0.8660254
const COS30 = 0.8660254
const SIN30 = 0.5

function iso(x,y){
 return [
  x + COS60*y,
  SIN60*y
 ]
}

function tilt(x,y){
 return [
  x*COS30 + y*SIN30,
  -x*SIN30 + y*COS30
 ]
}

function rot120(x,y){
 const c=-0.5
 const s=0.8660254
 return [
  x*c - y*s,
  x*s + y*c
 ]
}

function rot240(x,y){
 const c=-0.5
 const s=-0.8660254
 return [
  x*c - y*s,
  x*s + y*c
 ]
}

function transform(x,y,rot){

 let [x1,y1]=iso(x,y)
 let [x2,y2]=tilt(x1,y1)

 // 回転中心（下三角の頂点）
 const cx=0
 const cy=-100

 if(rot==1){
  x2-=cx
  y2-=cy
  ;[x2,y2]=rot120(x2,y2)
  x2+=cx
  y2+=cy
 }

 if(rot==2){
  x2-=cx
  y2-=cy
  ;[x2,y2]=rot240(x2,y2)
  x2+=cx
  y2+=cy
 }

 return [x2,y2]

}

function poly(points,color,rot){

 const svg=document.getElementById("skewb")

 const pts=points.map(([x,y])=>{

  let [X,Y]=transform(x,y,rot)

  return X + "," + (-Y)

 }).join(" ")

 const el=document.createElementNS(
  "http://www.w3.org/2000/svg",
  "polygon"
 )

 el.setAttribute("points",pts)
 el.setAttribute("fill",color)
 el.setAttribute("stroke","black")

 svg.appendChild(el)

}

const center=[[0,100],[-100,0],[0,-100],[100,0]]

const tris=[
 [[-100,100],[0,100],[-100,0]],
 [[100,100],[0,100],[100,0]],
 [[-100,-100],[0,-100],[-100,0]],
 [[100,-100],[0,-100],[100,0]]
]

function drawFace(color,rot){

setTimeout(poly,1000, center,color,rot)

 for(let i=0;i<4;i++){
  poly(tris[i],color,rot)
 }

}

// U 反時計回りに以下で描画
drawFace("white",0)

// F
drawFace("green",1)
 
// R
drawFace("red",2)


</script>

</body>
</html>
